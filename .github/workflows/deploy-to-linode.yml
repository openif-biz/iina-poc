name: Deploy to Linode

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Linode
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.LINODE_HOST }}
        username: root
        key: ${{ secrets.LINODE_SSH_KEY }}
        script: |
          cd ~/iina-poc
          git pull
          sudo docker compose build
          sudo docker compose up -d
