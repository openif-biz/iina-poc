name: Deploy to Linode

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Linode via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: root
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            PROJECT_NAME="iina_poc_streamlit"

            cd /root/${PROJECT_NAME}

            # GitHubから最新コード取得
            git fetch origin main
            git reset --hard origin/main

            # .env ファイル生成
            echo "NGROK_URL=${{ secrets.NGROK_URL }}" > .env

            # 既存コンテナ停止・削除
            sudo docker rm -f ${PROJECT_NAME}_app || true

            # 古いイメージ削除
            sudo docker image rm ${PROJECT_NAME}_app || true

            # 新しいイメージビルド
            sudo docker build -t ${PROJECT_NAME}_app .

            # 新しいコンテナ起動
            sudo docker run -d --name ${PROJECT_NAME}_app -p 8080:8080 --env-file .env ${PROJECT_NAME}_app

            # 不要イメージクリーンアップ
            sudo docker image prune -f
