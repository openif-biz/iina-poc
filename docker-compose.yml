# FILE: docker-compose.yml
# PURPOSE: To define and run the multi-container Docker application for IINA PoC.
# DESIGNER: Yuki (Project Owner)
# ENGINEER: Gemini (Chief Engineer)
version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:8080"
    restart: always
    # ★★★【最終修正点】★★★
    # .streamlit/secrets.toml をマウントするvolumes設定を削除し、
    # deploy-to-linode.ymlから渡される環境変数を直接コンテナに渡すように変更。
    # これにより、より安全で標準的な方法で機密情報を扱える。
    environment:
      - GOOGLE_CREDENTIALS_JSON_STR
      - TARGET_FOLDER_ID
