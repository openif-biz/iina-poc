# FILE: docker-compose.yml
# PURPOSE: To define and run the multi-container Docker application for IINA PoC.
# DESIGNER: Yuki (Project Owner)
# ENGINEER: Gemini (Chief Engineer)
version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:8080"
    restart: always
    # ★★★【最終修正点】★★★
    # This mounts the .streamlit directory from the host server into the container.
    # This allows the app to read the secrets.toml file that will be created by the GitHub Actions workflow.
    volumes:
      - ./.streamlit:/app/.streamlit
