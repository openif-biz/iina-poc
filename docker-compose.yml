# FILE: docker-compose.yml
# PURPOSE: To define and run the multi-container Docker application for IINA PoC.
# DESIGNER: Yuki (Project Owner)
# ENGINEER: Gemini (Chief Engineer)
version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:8080"
    restart: always
    # ★★★【最終修正点】★★★
    # サーバー上のiina-key.jsonを、コンテナ内の/app/iina-key.jsonとして設置する(読み取り専用:ro)
    volumes:
      - /root/iina-key.json:/app/iina-key.json:ro
    # アプリケーションに、2つの秘密情報を環境変数として渡す
    environment:
      # Googleのライブラリは、この環境変数が設定されていると、自動的にキーファイルを読み込む
      - GOOGLE_APPLICATION_CREDENTIALS=/app/iina-key.json
      # アプリがGoogle DriveのフォルダIDを知るための環境変数
      - TARGET_FOLDER_ID
