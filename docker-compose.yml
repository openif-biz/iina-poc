# FILE: docker-compose.yml
# PURPOSE: To define and run the multi-container Docker application for IINA PoC.
# DESIGNER: Yuki (Project Owner)
# ENGINEER: Gemini (Chief Engineer)
version: '3.8'

services:
  app:
    build: .
    # ★★★【最終修正点】★★★
    # Ensures that traffic to port 80 on the host server is forwarded
    # to port 8080 inside the container where the Streamlit app is running.
    ports:
      - "80:8080"
    restart: always
    environment:
      # This passes the service account key to the app inside the container.
      - GOOGLE_APPLICATION_CREDENTIALS=/root/iina-key.json
    volumes:
      # This mounts the key file from the host server into the container.
      - /root/iina-key.json:/root/iina-key.json
